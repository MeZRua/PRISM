[site]
title = "Albert"
description = "LLM Engineer & Researcher/PhD@CityU"
favicon = "/favicon.svg"
last_updated = "March 15, 2026"

[author]
name = "Mengzhe Ruan"
title = "LLM Researcher"
institution = "City University of Hong Kong"
avatar = "/bio.jpg"

# ============================================================
#  社交 & 联系方式（留空或删除对应行则隐藏）
# ============================================================
[social]
email    = "cs@my.cityu.edu.hk"                # ← 替换为真实邮箱
location = "Hong Kong SAR, China"                        # ← 替换为所在城市
location_url = "https://maps.google.com/maps?q=City+University+of+Hong+Kong"

location_details = [
  "Room , Building Name,",
  "City University of Hong Kong, Hong Kong SAR, China"
]

google_scholar = "https://scholar.google.com/citations?user=XXXXXXXX"  # ← 替换
orcid          = "https://orcid.org/0000-0000-0000-0000"               # ← 替换
github         = "https://github.com/MeZRua"                           # ✅ 已确认
linkedin       = "https://linkedin.com/in/yourprofile"                 # ← 替换

# ============================================================
#  功能开关
# ============================================================
[features]
enable_likes         = true    # 开启点赞（保持开启，增加互动感）
enable_one_page_mode = false   # 多页模式（有 Blog 时建议保持 false）

# ============================================================
#  多语言支持（中英双语）
# ============================================================
[i18n]
enabled        = true
locales        = ["en", "zh"]   # en 为第一项即默认语言
default_locale = "en"
mode           = "auto"         # 跟随浏览器语言自动切换
fixed_locale   = "en"
persist        = true           # 记住用户语言偏好
switcher       = true           # 右上角显示语言切换按钮

[i18n.labels]
en = "English"
zh = "中文"

# ============================================================
#  顶部导航菜单（顺序即显示顺序）
